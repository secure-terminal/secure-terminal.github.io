# AI-Assisted.
# Runs the dist-ai website-tests suite against this site: every internal link
# resolves, the footer carries the uniform family links, prose capitalizes
# "Open Source"/"Free Software", and the review-status banner never claims a
# green "working" state. The suite lives in org-ai-assisted/dist-ai (too
# high-volume for human review); here we check out both repos as siblings and
# point SECURE_TERMINAL_SITE_REPO at this checkout. debian:trixie-slim matches
# the dist-ai CI runtime.
name: web-consistency-tests

on:
  push:
    paths:
      - '**/*.html'
      - 'style.css'
      - '.github/workflows/web-consistency-tests.yml'
  pull_request:
    paths:
      - '**/*.html'
      - 'style.css'
      - '.github/workflows/web-consistency-tests.yml'

permissions:
  contents: read

jobs:
  web-consistency-tests:
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    steps:
      - name: Install tools
        run: apt-get update && apt-get install --yes --no-install-recommends git python3 ca-certificates

      - name: Check out secure-terminal.github.io
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: secure-terminal-site

      - name: Check out dist-ai (test suite)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: org-ai-assisted/dist-ai
          path: dist-ai

      - name: Run website-tests
        run: SECURE_TERMINAL_SITE_REPO="${GITHUB_WORKSPACE}/secure-terminal-site" bash dist-ai/usr/bin/website-tests
