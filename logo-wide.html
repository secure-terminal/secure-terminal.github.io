<!DOCTYPE html>
<html lang="en">
<!--
  Horizontal logo lockup source for secure-terminal. AI-Assisted.
  Rendered headless (transparent) + trimmed to logo-wide.png, used as a single <img> in nav/footer
  so the symbol+wordmark can never wrap or break apart. Sibling of output-lies' lockup (same
  typography), but its own symbol: the secure-terminal app icon -- a rounded terminal panel with a
  teal prompt chevron and cursor block, and a green shield with a checkmark for "secure". "secure"
  carries the green accent.
-->
<meta charset="utf-8">
<style>
  html,body{margin:0;background:transparent}
  body{display:inline-block}
  .lock{display:inline-flex;align-items:center;gap:15px;padding:14px 18px;
    font-family:"DejaVu Sans Mono","Cascadia Code",monospace;font-weight:700;font-size:74px;
    color:#14161b;letter-spacing:-3.5px;white-space:nowrap}
  .lock svg{width:82px;height:82px;flex:0 0 auto}
  .wm .s{color:#1f8a54}
  .wm .tm{font-size:.4em;color:#6b6f76;font-weight:600;vertical-align:super;margin-left:5px}
</style>
<body>
  <div class="lock">
    <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"><rect x="12" y="18" width="104" height="92" rx="14" ry="14" fill="#14161b" stroke="#3a3f4b" stroke-width="3"/><path d="M30 46 l20 15 -20 15" fill="none" stroke="#2ab0a0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><rect x="58" y="66" width="30" height="9" rx="2.5" fill="#e6e6e6"/><g transform="translate(74,58)"><path d="M21 3 L40 10 V28 C40 43 31 51 21 55 C11 51 2 43 2 28 V10 Z" fill="#1f8a54" stroke="#0f4d2f" stroke-width="2.5"/><path d="M12 29 l6 6 13 -15" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></g></svg>
    <span class="wm"><span class="s">secure</span>-terminal<span class="tm">&trade;</span></span>
  </div>
</body>
